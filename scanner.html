<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Ticket Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5f4f0;
      --surface:      #ffffff;
      --surface2:     #eeeee8;
      --border:       rgba(0,0,0,0.07);
      --border2:      rgba(0,0,0,0.12);
      --text:         #1a1a18;
      --muted:        #6b6b66;
      --hint:         #aaa9a2;
      --green:        #1D9E75;
      --green-bg:     rgba(29,158,117,0.10);
      --green-border: rgba(29,158,117,0.30);
      --red:          #E24B4A;
      --red-bg:       rgba(226,75,74,0.09);
      --red-border:   rgba(226,75,74,0.30);
      --amber:        #C47D0E;
      --amber-bg:     rgba(196,125,14,0.10);
      --amber-border: rgba(196,125,14,0.30);
      --radius:       12px;
      --radius-lg:    18px;
      --shadow:       0 1px 2px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      padding: 20px 16px 56px;
    }

    .wrap { max-width: 440px; margin: 0 auto; }

    /* header */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .header h1 { font-size: 20px; font-weight: 500; letter-spacing: -.02em; }
    .header p  { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .hbadge {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      padding: 4px 11px;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* camera */
    .cam-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    #cam-video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* dim outside the qr frame */
    .scan-dim {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.42);
      /* punch out central 58% square */
      clip-path: polygon(
        0% 0%, 100% 0%, 100% 100%, 0% 100%,
        0% 0%,
        21% 21%, 21% 79%, 79% 79%, 79% 21%, 21% 21%
      );
      pointer-events: none;
    }

    /* corner brackets */
    .scan-frame {
      position: absolute;
      top: 21%; left: 21%;
      width: 58%; height: 58%;
      pointer-events: none;
    }
    .scan-frame::before,
    .scan-frame::after,
    .scan-frame .inner::before,
    .scan-frame .inner::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: rgba(255,255,255,0.95);
      border-style: solid;
    }
    .scan-frame::before  { top:0; left:0;   border-width: 3px 0 0 3px; border-radius: 5px 0 0 0; }
    .scan-frame::after   { top:0; right:0;  border-width: 3px 3px 0 0; border-radius: 0 5px 0 0; }
    .scan-frame .inner::before { bottom:0; left:0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 5px; }
    .scan-frame .inner::after  { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 5px 0; }

    /* animated scan line */
    .scan-line {
      position: absolute;
      left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--green) 50%, transparent 100%);
      animation: scanLine 2s ease-in-out infinite;
      border-radius: 2px;
      box-shadow: 0 0 8px var(--green);
    }
    @keyframes scanLine {
      0%   { top: 4%;  opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { top: 94%; opacity: 0; }
    }

    /* hint */
    .cam-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 5px 15px;
      white-space: nowrap;
    }

    /* green flash */
    .cam-flash {
      position: absolute; inset: 0;
      background: rgba(29,158,117,0.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity .06s;
    }
    .cam-flash.on { opacity: 1; }

    /* error state */
    .cam-error {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255,255,255,.7);
      font-size: 13px;
      text-align: center;
      padding: 24px;
    }
    .cam-error svg { width: 36px; height: 36px; stroke: rgba(255,255,255,.5); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
    .retry-btn {
      margin-top: 4px;
      padding: 7px 18px;
      background: rgba(255,255,255,.14);
      border: 0.5px solid rgba(255,255,255,.22);
      border-radius: 8px;
      color: white;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    /* result card */
    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      display: none;
      animation: pop .16s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
    .result-card.valid        { border-color: var(--green-border); }
    .result-card.invalid-card { border-color: var(--red-border); }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 11px; border-radius: 20px;
      font-size: 11px; font-weight: 500; letter-spacing: .05em;
      margin-bottom: 12px; font-family: 'DM Mono', monospace;
    }
    .badge::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
    .badge.ok  { background: var(--green-bg);  color: var(--green); }
    .badge.err { background: var(--red-bg);    color: var(--red); }

    .ticket-code {
      font-family: 'DM Mono', monospace;
      font-size: 15px; font-weight: 500;
      color: var(--text); margin-bottom: 14px;
      word-break: break-all;
    }

    .prev-status {
      font-size: 12px; color: var(--muted);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .pill {
      font-family: 'DM Mono', monospace;
      font-size: 10px; padding: 2px 8px; border-radius: 20px;
    }
    .pill.PASSER  { background: var(--green-bg);  color: var(--green); }
    .pill.REFUSER { background: var(--red-bg);    color: var(--red); }
    .pill.ATTENTE { background: var(--amber-bg);  color: var(--amber); }
    .pill.none    { background: var(--surface2);  color: var(--muted); }

    .btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .btn {
      padding: 10px 6px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; border: 0.5px solid transparent;
      transition: opacity .12s, transform .08s;
    }
    .btn:active { transform: scale(.96); }
    .btn:hover  { opacity: .78; }
    .btn.passer  { background: var(--green-bg);  color: var(--green);  border-color: var(--green-border); }
    .btn.refuser { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border); }
    .btn.attente { background: var(--amber-bg);  color: var(--amber);  border-color: var(--amber-border); }

    .status-confirm {
      margin-top: 12px; font-size: 13px; color: var(--muted);
      min-height: 18px; display: flex; align-items: center; gap: 7px;
    }
    .status-confirm .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .status-confirm.PASSER  .dot { background: var(--green); }
    .status-confirm.REFUSER .dot { background: var(--red); }
    .status-confirm.ATTENTE .dot { background: var(--amber); }

    /* counters */
    .counters {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 14px;
    }
    .chip {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px; text-align: center;
      box-shadow: var(--shadow);
    }
    .chip .n { font-size: 20px; font-weight: 500; }
    .chip .l { font-size: 10px; color: var(--muted); margin-top: 2px; font-family:'DM Mono',monospace; }
    .chip.p .n { color: var(--green); }
    .chip.r .n { color: var(--red); }
    .chip.a .n { color: var(--amber); }

    /* log */
    .log-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .log-header h2 {
      font-size: 11px; font-weight: 500;
      color: var(--muted); letter-spacing:.07em; text-transform:uppercase;
    }
    .log-actions { display: flex; gap: 6px; }
    .icon-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px;
      background: var(--surface); border: 0.5px solid var(--border2);
      border-radius: 8px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      cursor: pointer; box-shadow: var(--shadow);
      transition: color .12s;
    }
    .icon-btn:hover { color: var(--text); }
    .icon-btn svg { width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

    .log-empty { font-size: 13px; color: var(--hint); text-align: center; padding: 28px 0; }
    .log-list { display: flex; flex-direction: column; gap: 6px; }
    .log-item {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      display: flex; align-items: center; gap: 11px;
      box-shadow: var(--shadow);
    }
    .log-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .log-dot.PASSER  { background: var(--green); }
    .log-dot.REFUSER { background: var(--red); }
    .log-dot.ATTENTE { background: var(--amber); }
    .log-code { font-family:'DM Mono',monospace; font-size:13px; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .log-meta { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
    .log-status { font-size:10px; font-weight:500; font-family:'DM Mono',monospace; }
    .log-status.PASSER  { color: var(--green); }
    .log-status.REFUSER { color: var(--red); }
    .log-status.ATTENTE { color: var(--amber); }
    .log-time { font-size:10px; color: var(--hint); }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <h1>Scanner de tickets</h1>
      <p>Caméra dorsale — positionnez le QR dans le cadre</p>
    </div>
    <div class="hbadge" id="hbadge">Démarrage…</div>
  </div>

  <div class="cam-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <div class="scan-dim"></div>
    <div class="scan-frame"><div class="inner"></div><div class="scan-line"></div></div>
    <div class="cam-hint">Centrez le QR dans le cadre</div>
    <div class="cam-flash" id="camFlash"></div>
    <div class="cam-error" id="camError">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
      <span id="camErrMsg">Accès caméra refusé</span>
      <button class="retry-btn" onclick="startCamera()">Réessayer</button>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="badge ok"  id="validBadge">TICKET VALIDE</div>
    <div class="badge err" id="invalidBadge" style="display:none">QR INVALIDE</div>
    <div class="ticket-code" id="ticketCode"></div>
    <div class="prev-status" id="prevStatus"></div>
    <div class="btns" id="actionBtns">
      <button class="btn passer"  onclick="setStatus('PASSER')">Passer</button>
      <button class="btn refuser" onclick="setStatus('REFUSER')">Refuser</button>
      <button class="btn attente" onclick="setStatus('ATTENTE')">Attente</button>
    </div>
    <div class="status-confirm" id="statusConfirm"></div>
  </div>

  <div class="counters">
    <div class="chip p"><div class="n" id="cntP">0</div><div class="l">PASSER</div></div>
    <div class="chip r"><div class="n" id="cntR">0</div><div class="l">REFUSER</div></div>
    <div class="chip a"><div class="n" id="cntA">0</div><div class="l">ATTENTE</div></div>
  </div>

  <div class="log-header">
    <h2>Historique</h2>
    <div class="log-actions">
      <button class="icon-btn" onclick="exportJSON()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        data.json
      </button>
      <button class="icon-btn" onclick="clearLog()">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  </div>
  <div class="log-list" id="logList"></div>
  <div class="log-empty" id="logEmpty">Aucun ticket scanné</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const VALID = [
  "TKT-W9FF-CYQY-CDYH",
  "TKT-AAAA-BBBB-CCCC",
  "VIP-123456"
];

const KEY = "ticket_data";
function load() { try { return JSON.parse(localStorage.getItem(KEY)||"{}"); } catch { return {}; } }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
let data = load();
let lastScanned = "";
let scanning = true;

const video    = document.getElementById("cam-video");
const camError = document.getElementById("camError");
const hbadge   = document.getElementById("hbadge");

async function startCamera() {
  camError.style.display = "none";
  hbadge.textContent = "Démarrage…";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 1280 } }
    });
    video.srcObject = stream;
    await video.play();
    hbadge.textContent = "Caméra active";
    requestAnimationFrame(tick);
  } catch(e) {
    camError.style.display = "flex";
    document.getElementById("camErrMsg").textContent =
      e.name === "NotAllowedError"
        ? "Accès caméra refusé — autorisez dans les réglages"
        : "Impossible d'accéder à la caméra";
    hbadge.textContent = "Erreur caméra";
  }
}

const offscreen = document.createElement("canvas");
const octx = offscreen.getContext("2d", { willReadFrequently: true });

function tick() {
  requestAnimationFrame(tick);
  if (!scanning || video.readyState !== video.HAVE_ENOUGH_DATA) return;
  const w = video.videoWidth, h = video.videoHeight;
  if (!w || !h) return;
  offscreen.width = w; offscreen.height = h;
  octx.drawImage(video, 0, 0, w, h);
  const img = octx.getImageData(0, 0, w, h);
  const code = jsQR(img.data, w, h, { inversionAttempts: "dontInvert" });
  if (code) onDecoded(code.data);
}

function extract(raw) {
  try { return new URL(raw).searchParams.get("t") || raw; } catch { return raw; }
}

function flash() {
  const f = document.getElementById("camFlash");
  f.classList.add("on");
  setTimeout(() => f.classList.remove("on"), 250);
}

function onDecoded(raw) {
  const ticket = extract(raw);
  if (ticket === lastScanned) return;
  lastScanned = ticket;
  scanning = false;
  flash();
  hbadge.textContent = ticket.length > 14 ? ticket.slice(0,13)+"…" : ticket;

  const card     = document.getElementById("resultCard");
  const vBadge   = document.getElementById("validBadge");
  const iBadge   = document.getElementById("invalidBadge");
  const actBtns  = document.getElementById("actionBtns");
  const prevSt   = document.getElementById("prevStatus");
  const stConf   = document.getElementById("statusConfirm");

  document.getElementById("ticketCode").textContent = ticket;
  stConf.textContent = ""; stConf.className = "status-confirm";

  const isValid = VALID.includes(ticket);
  card.style.display = "block";
  card.className = "result-card " + (isValid ? "valid" : "invalid-card");
  vBadge.style.display = isValid ? "inline-flex" : "none";
  iBadge.style.display = isValid ? "none" : "inline-flex";
  actBtns.style.display = isValid ? "grid" : "none";

  const ex = data[ticket];
  prevSt.innerHTML = (ex && ex.status)
    ? `Statut précédent <span class="pill ${ex.status}">${ex.status}</span>`
    : isValid ? `<span class="pill none">Non scanné</span>` : "";

  if (!isValid) setTimeout(resume, 3000);
  card.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function resume() {
  scanning = true; lastScanned = "";
  hbadge.textContent = "Caméra active";
}

function setStatus(status) {
  if (!lastScanned) return;
  data[lastScanned] = { ticket: lastScanned, status, time: new Date().toISOString() };
  save(data);

  const labels = { PASSER:"Passé", REFUSER:"Refusé", ATTENTE:"En attente" };
  const sc = document.getElementById("statusConfirm");
  sc.className = "status-confirm " + status;
  sc.innerHTML = `<div class="dot"></div><span>Enregistré : <strong>${labels[status]}</strong></span>`;
  document.getElementById("prevStatus").innerHTML =
    `Statut précédent <span class="pill ${status}">${status}</span>`;

  renderLog();
  setTimeout(resume, 2000);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "data.json"; a.click();
}

function clearLog() {
  if (!confirm("Effacer tout l'historique ?")) return;
  data = {}; save(data); lastScanned = ""; scanning = true;
  document.getElementById("resultCard").style.display = "none";
  hbadge.textContent = "Caméra active";
  renderLog();
}

function fmt(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("fr-FR") + " " + d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
}

function renderLog() {
  const list  = document.getElementById("logList");
  const empty = document.getElementById("logEmpty");
  const entries = Object.values(data).filter(e=>e.status).sort((a,b)=>new Date(b.time)-new Date(a.time));
  document.getElementById("cntP").textContent = entries.filter(e=>e.status==="PASSER").length;
  document.getElementById("cntR").textContent = entries.filter(e=>e.status==="REFUSER").length;
  document.getElementById("cntA").textContent = entries.filter(e=>e.status==="ATTENTE").length;
  if (!entries.length) { list.innerHTML = ""; empty.style.display="block"; return; }
  empty.style.display = "none";
  list.innerHTML = entries.map(e=>`
    <div class="log-item">
      <div class="log-dot ${e.status}"></div>
      <div class="log-code">${e.ticket}</div>
      <div class="log-meta">
        <div class="log-status ${e.status}">${e.status}</div>
        <div class="log-time">${fmt(e.time)}</div>
      </div>
    </div>
  `).join("");
}

startCamera();
renderLog();
</script>
</body>
</html>
