<body class="bg-background text-on-surface flex min-h-screen flex-col items-center justify-center p-3 sm:p-4">

      <!-- <hr class="mx-10 my-5">

      <span class="material-symbols-outlined text-5xl text-secondary-container mb-4 block">
        confirmation_number
      </span> -->

      <!-- <p class="text-on-primary/70 mt-3 text-sm">Billetterie Officielle</p> -->
    </div>
  </div>

  <div class="w-full max-w-sm sm:max-w-md">

    <!-- Main Card -->
    <div class="card border border-outline-variant/70 bg-surface-container-lowest">

      <div class="h-1.5 bg-gradient-to-r from-primary via-secondary-container to-secondary"></div>

      <div class="p-4 sm:p-6 lg:p-8">

        <!-- <div class="flex items-center gap-4 mb-8">
          <div class="w-11 h-11 rounded-2xl bg-primary-container flex items-center justify-center">
            <span class="material-symbols-outlined text-3xl text-on-primary">confirmation_number</span>
          </div>
          <div>
            <h2 class="text-2xl font-semibold text-primary">Vérification Billet</h2>
            <p class="text-on-surface-variant text-sm">VERIFICATION</p>
          </div>
        </div> -->

        <div id="content" class="min-h-auto">
          <div class="loading flex flex-col items-center justify-center py-12">
            <div class="w-10 h-10 border-4 border-surface-container border-t-secondary-container rounded-full animate-spin"></div>
            <p class="mt-6 text-on-surface-variant text-sm font-medium">Chargement du ticket...</p>
          </div>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div class="mt-8 flex flex-col items-center gap-5">

      <!-- Facebook Link mis à jour -->
      <a href="https://www.facebook.com/stk.akon.ny.fandresena.iavoloha" 
         target="_blank" 
         rel="noopener"
         class="fb-link flex items-center gap-2.5 text-on-surface-variant hover:text-secondary transition-colors">

        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="fb-svg">
          <path d="M22 12C22 6.47714 17.5229 1.99999 12 1.99999C6.47715 1.99999 2 6.47714 2 12C2 16.9913 5.65686 21.1283 10.4375 21.8785V14.8906H7.89844V12H10.4375V9.79687C10.4375 7.29062 11.9304 5.90624 14.2146 5.90624C15.3087 5.90624 16.4531 6.10155 16.4531 6.10155V8.56249H15.1921C13.9499 8.56249 13.5625 9.33333 13.5625 10.1242V12H16.3359L15.8926 14.8906H13.5625V21.8785C18.3431 21.1283 22 16.9913 22 12Z" fill="currentColor"/>

    <div id="detailsModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-3 sm:p-4" aria-hidden="true">
      <div class="w-full max-w-sm rounded-[2px] border border-outline-variant/70 bg-surface-container-lowest shadow-2xl overflow-hidden sm:max-w-2xl max-h-[90vh] flex flex-col">
        <div class="flex items-start justify-between gap-4 border-b border-outline-variant/70 px-4 py-3 sm:px-5 sm:py-4 shrink-0 bg-white/80 backdrop-blur-md">
          <div>
            <p class="text-[11px] uppercase tracking-[0.35em] text-on-surface-variant">Détails du ticket</p>
            <h3 id="modalTitle" class="mt-1 text-xl font-semibold text-primary">Détails du billet</h3>
          </div>
          <button id="closeDetailsModal" type="button" class="inline-flex h-9 w-9 items-center justify-center rounded-[2px] border border-outline-variant/70 bg-surface-container-lowest text-on-surface hover:bg-surface-container sm:h-10 sm:w-10" aria-label="Fermer la modale">
            <span class="material-symbols-outlined text-2xl">close</span>
          </button>
        </div>
        <div id="modalBody" class="overflow-y-auto bg-cover bg-center bg-no-repeat">
          <div class="min-h-full p-4 sm:p-5 backdrop-blur-md bg-white/70">
            <div id="detailsGrid" class="grid gap-3 grid-cols-1 sm:grid-cols-2"></div>
          <!-- <p class="mt-4 text-xs text-on-surface-variant">Les informations détaillées sont visibles ici, sans exposer le numéro du billet.</p> -->
        </div>
      </div>
    </div>

  </div>

  <script>
  // Script identique (inchangé)
  async function loadTicket() {
    const el = document.getElementById("content");
    const params = new URLSearchParams(window.location.search);
    const token = params.get("t");

    if (!token) {
      showErr(el, "Token manquant", "Aucun identifiant de ticket dans l'URL.");
      return;
    }

    try {
      const r = await fetch("./data.json");
      const data = await r.json();
      const tk = data.tickets.find(x => x.token === token);

      if (!tk) {
        showErr(el, "Ticket invalide", "Ce billet n'existe pas ou a été supprimé.");
        return;
      }

      const isValid = tk.statut?.toLowerCase() === "valide";

      el.style.backgroundImage = isValid
        ? 'linear-gradient(rgba(247, 249, 251, 0.88), rgba(247, 249, 251, 0.88)), url("12.png")'
        : '';
      el.style.backgroundSize = 'cover';
      el.style.backgroundPosition = 'center';
      el.style.backgroundRepeat = 'no-repeat';
      el.style.borderRadius = '2px';

      el.innerHTML = `
        <div class="mb-4 rounded-[2px] border border-outline-variant/70 bg-surface-container-lowest p-3 shadow-sm sm:p-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0 space-y-2">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-xl text-secondary-container">${isValid ? 'verified' : 'cancel'}</span>
                <span class="rounded-[2px] border border-current/20 bg-current/5 px-2.5 py-1 text-[11px] font-semibold uppercase tracking-[0.35em] ${isValid ? 'text-emerald-700' : 'text-red-700'}">${tk.statut}</span>
              </div>
              <p class="text-xs text-on-surface-variant">État du billet</p>
            </div>
            <button id="openDetailsBtn" type="button" class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-[2px] border border-outline-variant/70 bg-surface-container text-on-surface hover:bg-surface-container-low" aria-label="Afficher les détails du ticket">
              <span class="material-symbols-outlined text-xl">more_horiz</span>
            </button>
          </div>
        </div>

        <div class="rounded-[2px] border border-outline-variant/70 bg-surface-container p-3 sm:p-4">
          <p class="text-[11px] uppercase tracking-[0.35em] text-on-surface-variant">Token</p>
          <p class="mt-2 break-all font-mono text-xs text-on-surface sm:text-sm">${token}</p>
        </div>
      `;

      const openBtn = document.getElementById('openDetailsBtn');
      if (openBtn) {
        openBtn.addEventListener('click', () => openDetailsModal(tk));
      }
    } catch (e) {
      console.error(e);
      showErr(el, "Erreur de chargement", "Impossible de récupérer les informations du ticket.");
    }
  }

  function createRow(icon, label, value) {
    return `
      <div class="flex gap-4">
        <span class="material-symbols-outlined text-secondary text-xl flex-shrink-0 mt-0.5">${icon}</span>
        <div class="flex-1">
          <p class="text-on-surface-variant text-xs font-medium tracking-widest uppercase">${label}</p>
          <p class="text-on-surface font-medium">${value ?? '—'}</p>
        </div>
      </div>
    `;
  }

  function openDetailsModal(ticket) {
    const modal = document.getElementById('detailsModal');
    const title = document.getElementById('modalTitle');
    const grid = document.getElementById('detailsGrid');
    const body = document.getElementById('modalBody');

    if (!modal || !title || !grid || !body) return;

    title.textContent = ticket.event || 'Détails du billet';

    const isValid = String(ticket.statut || '').toLowerCase() === 'valide';

    body.style.backgroundImage = isValid ? 'url("12.png")' : 'none';
    body.style.backgroundSize = 'cover';
    body.style.backgroundPosition = 'center';
    body.style.backgroundRepeat = 'no-repeat';

    const details = [
      ['event_note', 'Événement', ticket.event],
      ['calendar_month', 'Date', new Date(ticket.date).toLocaleDateString('fr-FR')],
      ['schedule', 'Heure', ticket.heure],
      ['sell', 'Prix', ticket.prix + ' Ar'],
      ['category', 'Catégorie', ticket.categorie],
      ['location_on', 'Lieu', ticket.lieu],
      ['person', 'Organisateur', ticket.organisateur],
      ['sticky_note_2', 'Notes', ticket.notes || 'Aucune note'],
    ];

    grid.innerHTML = details
      .map(([icon, label, value]) => `
        <article class="border-b border-outline-variant/70 bg-surface-container-lowest p-3 shadow-md sm:p-4">
          <div class="flex items-center gap-2 text-secondary">
            <span class="material-symbols-outlined text-xl">${icon}</span>
            <p class="text-[11px] font-semibold uppercase tracking-[0.25em] text-on-surface-variant">${label}</p>
          </div>
          <p class="mt-3 text-sm font-semibold text-on-surface">${value ?? '—'}</p>
        </article>
      `)
      .join('');

    modal.classList.remove('hidden');
    modal.classList.add('flex');
    modal.setAttribute('aria-hidden', 'false');
    document.body.classList.add('overflow-hidden');
  }

  function closeDetailsModal() {
    const modal = document.getElementById('detailsModal');
    if (!modal) return;

    modal.classList.add('hidden');
    modal.classList.remove('flex');
    modal.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('overflow-hidden');
  }

  function showErr(el, title, msg) {
    el.innerHTML = `
      <div class="text-center py-12">
        <div class="mx-auto w-16 h-16 rounded-2xl bg-red-100 flex items-center justify-center">
          <span class="material-symbols-outlined text-red-600 text-4xl">error</span>
        </div>
        <h3 class="mt-6 font-semibold text-red-700">${title}</h3>
        <p class="mt-2 text-on-surface-variant">${msg}</p>
      </div>
    `;
  }

  const modal = document.getElementById('detailsModal');
  const closeBtn = document.getElementById('closeDetailsModal');

  if (closeBtn) {
    closeBtn.addEventListener('click', closeDetailsModal);
  }

  if (modal) {
    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        closeDetailsModal();
      }
    });
  }

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeDetailsModal();
    }
  });

  loadTicket();
  </script>
</body>
